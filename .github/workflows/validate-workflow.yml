name: Validate Workflow Package

on:
  pull_request:
  push:

jobs:
  validate-workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Validate workflow package
        run: ruby scripts/validate_workflow.rb
