mode: STRICT # STRICT | AUTO_APPROVE

approvals:
  initial_setup: explicit
  proposal: explicit
  implementation_start: explicit
  pre_merge: explicit
  auto_allow_prompt_enabled: true
  auto_allow_toggle_back: true

quality_gate:
  require_contracts: true
  require_tests_before_code: true
  require_security_pass: true
  block_known_vulnerabilities: true
  block_known_issues_from_merge: true
  qa_is_final_gate: true

branching:
  strategy: feature-branch
  merge_target: main
  require_pr_review: true

coverage:
  unit: target
  integration: target
  e2e: target

security:
  scan_dependencies: true
  scan_secrets: true
  scan_sast: true
  allow_user_override: false

coordination:
  team_mum_enabled: true
  team_mum_mode: optional # optional | off
  team_mum_selection_strategy: utilization-and-relevance # utilization-and-relevance | full-check; fall back to relevance-first when utilization data is unavailable
  team_mum_max_consulted_roles: 5
  team_mum_consultation_rounds: 1
  team_mum_emit_extra_consultation_as_future_actions: true
  team_mum_max_future_actions: 5
  team_mum_keep_notes_concise: true
  team_mum_max_bullets_per_section: 3
  team_mum_check_in_frequency: stage-or-handoff-risk # once-per-stage | handoff-risk | stage-or-handoff-risk
  team_mum_reflect_on_recent_agent_utilization: true

swarm:
  enabled: true
  selection_strategy: referenced-first # referenced-first | full-panel
  max_swarm_depth: 1
  allow_sub_swarms: false
  consultation_rounds: 1
  max_roles_per_swarm: 5
  max_tokens_per_swarm_notes: 1200 # soft cap unless the host app can meter tokens directly; role and bullet caps remain the hard backstop
  emit_recursive_requests_as_future_actions: true
  max_future_actions: 5
  keep_role_notes_concise: true
  max_bullets_per_role_note: 3
  full_panel_is_opt_in: true # enabling full-panel may significantly increase token use

role_selection:
  require_role_definition_for_auto_selection: true
  require_aliases_for_auto_selection: true
  warn_on_unregistered_roles: true
  warn_on_roles_missing_base_configuration: true
  exclude_roles_missing_base_configuration_from_auto_selection: true

